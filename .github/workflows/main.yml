name: Transmision Ruta Karaoke - V18 Saca Bucle

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Clonar archivos
        uses: actions/checkout@v4

      - name: 2. Instalar FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 3. Auditoría de Inventario y Transmisión
        shell: bash
        run: |
          # A. Crear video de fondo estable
          ffmpeg -loop 1 -i logo.png -c:v libx264 -t 10 -pix_fmt yuv420p -vf "scale=1280:720" fondo.mp4 -y

          # B. BUSCADOR AGRESIVO (Encuentra archivos en cualquier carpeta)
          echo "Buscando todas las canciones en el repositorio..."
          find . -name "*.mp3" -exec mv {} . \; 2>/dev/null || true

          # C. NORMALIZACIÓN Y CONTEO
          i=1
          for f in *.mp3; do
            mv "$f" "pista_$i.mp3"
            i=$((i+1))
          done
          echo "AUDITORÍA: Se encontraron $((i-1)) canciones para la radio."

          # D. SHUFFLE (Mezcla total)
          ls pista_*.mp3 | shuf > lista_final.txt
          rm -f list.txt
          while read -r song; do
            echo "file '$song'" >> list.txt
          done < lista_final.txt

          # E. TRANSMISIÓN (Recodificando para evitar que se pegue)
          ffmpeg -re -stream_loop -1 -i fondo.mp4 -stream_loop -1 -f concat -safe 0 -i list.txt \
          -map 0:v:0 -map 1:a:0 \
          -c:v libx264 -preset ultrafast -tune stillimage \
          -b:v 2500k -minrate 2500k -maxrate 2500k -bufsize 5000k \
          -pix_fmt yuv420p -g 60 \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
