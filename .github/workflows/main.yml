name: Ruta Karaoke Live Stream
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

concurrency:
  group: radio-stream
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: |
          # 1. Escanear y barajar la lista
          rm -f list.txt
          for f in *.mp3; do ffprobe -v error "$f" >/dev/null 2>&1 && echo "file '$f'" >> list.txt; done
          shuf list.txt > list_final.txt
          
          # 2. Conexión DIRECTA a la antena principal (Bypass de AutoDJ)
          ffmpeg -re -stream_loop -1 -f concat -safe 0 -i list_final.txt \
          -vn -c:a libmp3lame -b:a 96k -ar 44100 -content_type audio/mpeg \
          -ice_name "Ruta Karaoke" \
          -f mp3 "icecast://source:4CRwycMC@radio.nitro-server.uk:9120/radio.mp3"
