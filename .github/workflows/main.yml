name: Transmision Radio 24/7 - Shuffle y Auto-Reinicio

on:
  workflow_dispatch:
  schedule:
    # SE REINICIA SOLO CADA 6 HORAS (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: '0 */6 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Clonar archivos
        uses: actions/checkout@v4

      - name: 2. Instalar FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 3. Preparación y Transmisión Aleatoria
        shell: bash
        run: |
          # A. Crear video de fondo estable
          ffmpeg -loop 1 -i logo.png -c:v libx264 -t 10 -pix_fmt yuv420p -vf "scale=1280:720" fondo.mp4 -y

          # B. RENOMBRADO PREVENTIVO (Elimina errores de nombres de raíz)
          # Convertimos todo a nombres simples: song_1.mp3, song_2.mp3...
          echo "Simplificando nombres de archivos..."
          i=1
          for f in *.mp3; do
            mv "$f" "song_$i.mp3"
            i=$((i+1))
          done

          # C. MODO ALEATORIO (Shuffle)
          # Barajamos los archivos y creamos la lista de reproducción
          ls song_*.mp3 | shuf > lista_barajada.txt
          rm -f list.txt
          while read -r song; do
            echo "file '$PWD/$song'" >> list.txt
          done < lista_barajada.txt

          echo "--- ORDEN ALEATORIO GENERADO ---"
          cat list.txt
          echo "--------------------------------"

          # D. TRANSMISIÓN CON RE-CODIFICACIÓN (Evita el Segmentation Fault)
          # No usamos "copy" para que FFmpeg estandarice todas las canciones al vuelo
          ffmpeg -re -stream_loop -1 -i fondo.mp4 -stream_loop -1 -f concat -safe 0 -i list.txt \
          -map 0:v:0 -map 1:a:0 \
          -c:v libx264 -preset ultrafast -tune stillimage \
          -b:v 2500k -minrate 2500k -maxrate 2500k -bufsize 5000k \
          -pix_fmt yuv420p -g 60 \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
