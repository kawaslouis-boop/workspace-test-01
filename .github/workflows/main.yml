name: Transmision Ruta Karaoke

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar archivos
        uses: actions/checkout@v3

      - name: Instalar FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Transmitir a YouTube
        shell: bash
        run: |
          # Generamos la lista de canciones
          for f in ./*.mp3; do echo "file '$PWD/$f'" >> list.txt; done
          
          # Ajuste Pro: Forzamos 30 frames por segundo y sintonía de imagen fija
          ffmpeg -loop 1 -i logo.png -re -f concat -safe 0 -i list.txt \
          -c:v libx264 -preset ultrafast -tune stillimage \
          -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2,format=yuv420p" \
          -r 30 -g 60 -b:v 2500k -maxrate 2500k -bufsize 5000k \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
