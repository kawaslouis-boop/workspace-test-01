name: Transmision Radio 24/7 - V17 Estabilidad Pro

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Clonar archivos
        uses: actions/checkout@v4

      - name: 2. Instalar FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 3. Preparación y Transmisión Aleatoria
        shell: bash
        run: |
          # A. Crear video de fondo
          ffmpeg -loop 1 -i logo.png -c:v libx264 -t 10 -pix_fmt yuv420p -vf "scale=1280:720" fondo.mp4 -y

          # B. NORMALIZACIÓN TOTAL (Nombres cortos y sin símbolos)
          echo "Simplificando nombres de canciones..."
          i=1
          for f in *.mp3; do
            # Renombramos a nombres temporales para evitar conflictos si ya existen song_X
            mv "$f" "temp_$i.mp3"
            i=$((i+1))
          done
          
          # Renombrado final a formato limpio
          j=1
          for f in temp_*.mp3; do
            mv "$f" "s$j.mp3"
            j=$((j+1))
          done

          # C. GENERAR LISTA ALEATORIA (Con rutas relativas simples)
          ls s*.mp3 | shuf > lista_mezclada.txt
          rm -f list.txt
          while read -r song; do
            # Usamos solo el nombre del archivo, sin la ruta larga de /home/runner/...
            echo "file '$song'" >> list.txt
          done < lista_mezclada.txt

          echo "--- BITÁCORA DE REPRODUCCIÓN ---"
          cat list.txt
          echo "-------------------------------"

          # D. TRANSMISIÓN BROADCAST
          # Agregamos -safe 0 para que acepte la lista sin problemas de permisos
          ffmpeg -re -stream_loop -1 -i fondo.mp4 -stream_loop -1 -f concat -safe 0 -i list.txt \
          -map 0:v:0 -map 1:a:0 \
          -c:v libx264 -preset ultrafast -tune stillimage \
          -b:v 2500k -minrate 2500k -maxrate 2500k -bufsize 5000k \
          -pix_fmt yuv420p -g 60 \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
