name: Proceso de sistema Sync
on:
  workflow_dispatch:
  schedule:
    # Póliza de Relevo Seguro: Llamado oficial cada 2 horas.
    # Si un llamado falla, el proceso sigue vivo y el siguiente llamado (hora 4) lo rescata.
    - cron: '0 */2 * * *'

concurrency:
  group: radio-stream
  # El "Perro Guardián": El nuevo relevista entra y cancela al anterior de forma limpia.
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Cleanup Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 2. Initialization
        uses: actions/checkout@v4

      - name: 3. Environment Setup (Modo Veloz)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends liquidsoap p7zip-full

      - name: 4. Data Extraction
        run: |
          mkdir -p musica_segura
          for f in *.zip; do 
            echo "Processing: $f"
            7z x "$f" -p"${{ secrets.CLAVE_ZIP }}" -o"musica_segura/" -y || true
          done

      - name: 5. Execution Continua (Motor Blindado)
        run: |
          cd musica_segura
          # Separación de activos: Música normal vs Archivos de camuflaje (autodoc)
          ls *.mp3 | grep -v "autodoc" > list.txt
          ls autodoc*.mp3 > jingles_list.txt || echo "sin_jingles" > jingles_list.txt
          
          cat << 'EOF' > radio.liq
          jingles = playlist(mode="randomize", "jingles_list.txt")
          musica = playlist(mode="randomize", "list.txt")
          
          # Configuración de mezcla: 1 jingle por cada 5 canciones. 
          # Si no hay jingles disponibles, Liquidsoap usará solo la música sin dar error.
          radio = rotate(weights=[1, 5], [jingles, musica])
          
          output.icecast(
            %mp3(bitrate=96),
            host="${{ secrets.RADIO_HOST }}",
            port=${{ secrets.RADIO_PORT }},
            password="${{ secrets.CLAVE_RADIO }}",
            mount="${{ secrets.RADIO_MOUNT }}",
            name="Media Test Stream",
            description="Automated environment for data synchronization",
            genre="Testing",
            mksafe(radio)
          )
          EOF
          
          # Ejecución infinita. Solo se detendrá cuando GitHub envíe el próximo relevo exitoso.
          liquidsoap radio.liq
