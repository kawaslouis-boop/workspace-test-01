name: Transmision Ruta Karaoke - Diagnostico

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Clonar archivos
        uses: actions/checkout@v4

      - name: 2. Inspeccion de Auditoria (Ver archivos)
        run: |
          echo "Buscando archivos en la carpeta..."
          ls -R
          echo "-----------------------------------"

      - name: 3. Instalar FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 4. Crear Video y Transmitir
        shell: bash
        run: |
          # Crear video de fondo
          ffmpeg -loop 1 -i logo.png -c:v libx264 -t 10 -pix_fmt yuv420p -vf "scale=1280:720" fondo.mp4 -y

          # Crear lista de canciones de forma segura
          rm -f list.txt
          for f in *.mp3; do
            [ -e "$f" ] || continue
            echo "file '$PWD/$f'" >> list.txt
          done

          # Si la lista esta vacia, dar error claro
          if [ ! -f list.txt ]; then
            echo "ERROR CRITICO: No se encontraron archivos MP3."
            exit 1
          fi

          # Transmitir
          ffmpeg -re -stream_loop -1 -i fondo.mp4 -f concat -safe 0 -i list.txt \
          -c:v libx264 -preset ultrafast -tune stillimage \
          -b:v 2500k -minrate 2500k -maxrate 2500k -bufsize 5000k \
          -r 30 -g 60 -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
