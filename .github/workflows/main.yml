name: Transmision Ruta Karaoke

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar archivos
        uses: actions/checkout@v3

      - name: Instalar FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Transmitir a YouTube
        shell: bash
        run: |
          # Limpiamos y creamos la lista de canciones
          rm -f list.txt
          for f in ./*.mp3; do echo "file '$PWD/$f'" >> list.txt; done
          
          # COMANDO DE BAJO CONSUMO (480p) - IDEAL PARA RADIOS ONLINE
          ffmpeg -re -loop 1 -i logo.png -f concat -safe 0 -i list.txt \
          -c:v libx264 -preset ultrafast -tune stillimage -pix_fmt yuv420p \
          -vf "scale=854:480:force_original_aspect_ratio=decrease,pad=854:480:(ow-iw)/2:(oh-ih)/2" \
          -r 20 -g 40 -b:v 800k -minrate 800k -maxrate 800k -bufsize 1600k \
          -c:a aac -b:a 128k -ar 44100 \
          -max_interleave_delta 0 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
