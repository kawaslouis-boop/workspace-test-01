name: Radio Activa 2000k
on:
  workflow_dispatch:
jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - env:
          KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          ffmpeg -loop 1 -i logo.png -c:v libx264 -t 10 -pix_fmt yuv420p fondo.mp4 -y
          rm -f list.txt
          for f in *.mp3; do ffprobe -v error "$f" >/dev/null 2>&1 && echo "file '$f'" >> list.txt; done
          shuf list.txt > list_final.txt
          ffmpeg -re -stream_loop -1 -i fondo.mp4 -stream_loop -1 -f concat -safe 0 -i list_final.txt -c:v libx264 -preset ultrafast -b:v 2000k -maxrate 2000k -bufsize 4000k -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -f flv "rtmp://a.rtmp.youtube.com/live2/$KEY"
          
