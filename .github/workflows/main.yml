name: Transmision Ruta Karaoke - Estabilidad Pro

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar archivos
        uses: actions/checkout@v3

      - name: Instalar FFmpeg en la Nube
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Crear Video y Transmitir
        shell: bash
        run: |
          # 1. Convertimos tu logo.png en un video de 10 segundos (lo hace GitHub)
          ffmpeg -loop 1 -i logo.png -c:v libx264 -t 10 -pix_fmt yuv420p -vf "scale=1280:720" fondo.mp4
          
          # 2. Creamos la lista de canciones
          rm -f list.txt
          for f in ./*.mp3; do echo "file '$PWD/$f'" >> list.txt; done
          
          # 3. Transmitimos el video en bucle + tus canciones
          ffmpeg -re -stream_loop -1 -i fondo.mp4 -f concat -safe 0 -i list.txt \
          -c:v libx264 -preset ultrafast -tune stillimage \
          -b:v 2000k -maxrate 2000k -bufsize 4000k \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
