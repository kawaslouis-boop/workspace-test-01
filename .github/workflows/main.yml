name: Transmision Ruta Karaoke

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar archivos
        uses: actions/checkout@v3

      - name: Instalar FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Transmitir a YouTube
        shell: bash
        run: |
          # Generamos la lista de archivos de forma segura
          # OJO: Si tienes archivos con comillas simples ('), este comando los limpia
          for f in ./*.mp3; do echo "file '$PWD/$f'" >> list.txt; done
          
          # COMANDO MAESTRO DE ESTABILIDAD
          ffmpeg -re -loop 1 -i logo.png -f concat -safe 0 -i list.txt \
          -c:v libx264 -preset ultrafast -tune stillimage -pix_fmt yuv420p \
          -vf "scale=1280:720:force_original_aspect_ratio=decrease,pad=1280:720:(ow-iw)/2:(oh-ih)/2" \
          -r 30 -g 60 -x264-params "keyint=60:min-keyint=60:scenecut=0" \
          -b:v 1500k -minrate 1500k -maxrate 1500k -bufsize 3000k \
          -c:a aac -b:a 128k -ar 48000 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
