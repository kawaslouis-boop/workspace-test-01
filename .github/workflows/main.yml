name: Transmision Ruta Karaoke - Edicion Pro Final

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar archivos del repositorio
        uses: actions/checkout@v4

      - name: Instalar FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Crear Video y Transmitir
        shell: bash
        run: |
          # 1. Crear video de 10 seg desde el logo (Esto ya vimos que funciona bien)
          ffmpeg -loop 1 -i logo.png -c:v libx264 -t 10 -pix_fmt yuv420p -vf "scale=1280:720,format=yuv420p" fondo.mp4 -y

          # 2. Generar la lista de canciones MP3 (Método Simplificado)
          rm -f list.txt
          for f in *.mp3; do
            echo "file '$PWD/$f'" >> list.txt
          done
          
          # Verificación de seguridad para auditoría
          echo "--- LISTA DE CANCIONES GENERADA ---"
          cat list.txt
          echo "-----------------------------------"

          # 3. Ignición de la Radio
          ffmpeg -re -stream_loop -1 -i fondo.mp4 -f concat -safe 0 -i list.txt \
          -c:v libx264 -preset ultrafast -tune stillimage \
          -b:v 2500k -minrate 2500k -maxrate 2500k -bufsize 5000k \
          -r 30 -g 60 -keyint_min 60 -x264-params "keyint=60:min-keyint=60:scenecut=0" \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
