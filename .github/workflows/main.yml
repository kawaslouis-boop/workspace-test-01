name: Proceso de sistema Sync
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */2 * * *'

concurrency:
  group: radio-stream
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Limpiar historial de procesos
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 2. Descargar repositorio
        uses: actions/checkout@v4

      - name: 3. Instalar herramientas de audio y extracción
        run: |
          sudo apt-get update
          sudo apt-get install -y liquidsoap p7zip-full

      - name: 4. Extraer todas las Bovedas (ZIP) acumuladas
        run: |
          mkdir -p musica_segura
          # Busca todos los archivos .zip y los extrae usando la clave maestra.
          # 7z une automáticamente las partes (.z01, .z02) si el .zip principal existe.
          for f in *.zip; do 
            echo "Procesando archivo: $f"
            7z x "$f" -p"${{ secrets.CLAVE_ZIP }}" -o"musica_segura/" -y || true
          done

      - name: 5. Ejecutar Transmisión Blindada
        run: |
          cd musica_segura
          # Generar lista de reproducción basada en los MP3 extraídos
          rm -f list.txt
          ls *.mp3 > list.txt
          
          # Crear configuración de Liquidsoap con variables ocultas
          cat << 'EOF' > radio.liq
          musica = playlist(mode="randomize", "list.txt")
          
          output.icecast(
            %mp3(bitrate=96),
            host="${{ secrets.RADIO_HOST }}",
            port=${{ secrets.RADIO_PORT }},
            password="${{ secrets.CLAVE_RADIO }}",
            mount="${{ secrets.RADIO_MOUNT }}",
            name="Ruta Karaoke",
            description="Canta a todo pulmon - 24/7 Estacion Digital",
            genre="Karaoke",
            mksafe(musica)
          )
          EOF
          
          # Iniciar la radio
          liquidsoap radio.liq
