name: Transmision Ruta Karaoke - V14 Estabilidad Total

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Clonar archivos
        uses: actions/checkout@v4

      - name: 2. Instalar FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 3. Limpieza de Auditoría y Transmisión
        shell: bash
        run: |
          # A. Crear video de fondo estable
          ffmpeg -loop 1 -i logo.png -c:v libx264 -t 10 -pix_fmt yuv420p -vf "scale=1280:720" fondo.mp4 -y

          # B. NORMALIZAR ARCHIVOS (Eliminar espacios y tildes de raíz)
          echo "Saneando nombres de canciones..."
          for f in *.mp3; do
            [ -e "$f" ] || continue
            # Cambiamos espacios por guiones y quitamos tildes
            nuevo=$(echo "$f" | tr ' ' '_' | sed 's/[áéíóúÁÉÍÓÚ]/x/g' | tr -d "()")
            mv "$f" "$nuevo"
          done

          # C. Crear lista de reproducción (Loop Infinito)
          rm -f list.txt
          for f in *.mp3; do
            echo "file '$PWD/$f'" >> list.txt
          done
          
          echo "--- LISTA GENERADA ---"
          cat list.txt
          echo "----------------------"

          # D. TRANSMISIÓN BROADCAST (Video y Audio en bucle infinito)
          # Forzamos que el audio también sea un bucle (-stream_loop -1)
          ffmpeg -re -stream_loop -1 -i fondo.mp4 -stream_loop -1 -f concat -safe 0 -i list.txt \
          -map 0:v:0 -map 1:a:0 \
          -c:v libx264 -preset ultrafast -tune stillimage \
          -b:v 2500k -minrate 2500k -maxrate 2500k -bufsize 5000k \
          -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
