name: Transmision Ruta Karaoke - V27 Victoria Final

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Clonar archivos
        uses: actions/checkout@v4

      - name: 2. Instalar FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 3. Auditoría y Transmisión
        shell: bash
        env:
          # Aquí amarramos la llave con doble candado
          LLAVE_YOUTUBE: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # A. Video de fondo
          ffmpeg -loop 1 -i logo.png -c:v libx264 -t 10 -pix_fmt yuv420p -vf "scale=1280:720" fondo.mp4 -y

          # B. Filtrar canciones (Si ffprobe falla, la canción se descarta)
          mkdir -p lista_limpia
          count=0
          for f in *.mp3; do
            if ffprobe -v error "$f" > /dev/null 2>&1; then
              cp "$f" "lista_limpia/s_$count.mp3"
              count=$((count+1))
            else
              echo "CANCION DAÑADA DESCARTADA: $f"
            fi
          done

          # C. Crear lista aleatoria
          ls lista_limpia/*.mp3 | shuf > playlist.txt
          rm -f list.txt
          while read -r s; do
            echo "file '$s'" >> list.txt
          done < playlist.txt

          echo "AUDITORÍA: Tenemos $count canciones listas para sonar."

          # D. Transmitir (Usando la variable segura $LLAVE_YOUTUBE)
          ffmpeg -re -stream_loop -1 -i fondo.mp4 -stream_loop -1 -f concat -safe 0 -i list.txt \
          -map 0:v:0 -map 1:a:0 \
          -c:v libx264 -preset ultrafast -tune stillimage \
          -b:v 2500k -minrate 2500k -maxrate 2500k -bufsize 5000k \
          -pix_fmt yuv420p -g 60 \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$LLAVE_
          YOUTUBE"
