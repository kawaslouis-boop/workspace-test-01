name: Ruta Karaoke Live Stream
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */5 * * *'

concurrency:
  group: radio-stream
  cancel-in-progress: true

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar Consola Profesional (Liquidsoap)
        run: sudo apt-get update && sudo apt-get install -y liquidsoap
      - name: Transmitir con Metadata Dinamica
        run: |
          # 1. Crear el inventario de pistas
          rm -f list.txt
          ls *.mp3 > list.txt
          
          # 2. Crear las instrucciones de la consola
          cat << 'EOF' > radio.liq
          # Cargar la lista y barajarla automáticamente
          musica = playlist(mode="randomize", "list.txt")
          
          # Enviar la señal al servidor leyendo la metadata nativa
          output.icecast(
            %mp3(bitrate=96),
            host="radio.nitro-server.uk",
            port=9120,
            password="4CRwycMC",
            mount="radio.mp3",
            name="Ruta Karaoke",
            description="Canta a todo pulmon",
            genre="Karaoke",
            mksafe(musica)
          )
          EOF
          
          # 3. Arrancar el nuevo motor
          liquidsoap radio.liq
