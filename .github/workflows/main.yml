name: Transmision Ruta Karaoke - Blindaje Final

on:
  workflow_dispatch:

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Clonar archivos
        uses: actions/checkout@v4

      - name: 2. Instalar FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 3. Limpieza de Nombres y Transmisión
        shell: bash
        run: |
          # A. Crear video de fondo desde tu logo
          ffmpeg -loop 1 -i logo.png -c:v libx264 -t 10 -pix_fmt yuv420p -vf "scale=1280:720" fondo.mp4 -y

          # B. NORMALIZAR NOMBRES (Quitar espacios y tildes automáticamente)
          echo "Normalizando nombres de canciones..."
          for f in *.mp3; do
            [ -e "$f" ] || continue
            # Quitamos espacios y caracteres especiales para que FFmpeg no se trabe
            nuevo_nombre=$(echo "$f" | tr ' ' '_' | sed 's/[áéíóúÁÉÍÓÚ]/x/g')
            mv "$f" "$nuevo_nombre"
          done

          # C. Generar lista de reproducción limpia
          rm -f list.txt
          for f in *.mp3; do
            echo "file '$PWD/$f'" >> list.txt
          done
          
          echo "--- LISTA AUDITADA ---"
          cat list.txt
          echo "----------------------"

          # D. IGNICIÓN DE LA RADIO (Bitrate constante para evitar el buffering)
          ffmpeg -re -stream_loop -1 -i fondo.mp4 -f concat -safe 0 -i list.txt \
          -c:v libx264 -preset ultrafast -tune stillimage \
          -b:v 2000k -minrate 2000k -maxrate 2000k -bufsize 4000k \
          -r 30 -g 60 -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/${{ secrets.YOUTUBE_STREAM_KEY }}"
