name: Transmision Ruta Karaoke - V30 Estable

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Clonar archivos
        uses: actions/checkout@v4

      - name: 2. Instalar FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: 3. Auditoría y Transmisión
        shell: bash
        env:
          # Se asigna el secreto a una variable de entorno segura
          YOUTUBE_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # A. Crear video de fondo
          ffmpeg -loop 1 -i logo.png -c:v libx264 -t 10 -pix_fmt yuv420p -vf "scale=1280:720" fondo.mp4 -y

          # B. Filtrar canciones (Ignorar las que dan error)
          mkdir -p music_checked
          for f in *.mp3; do
            if ffprobe -v error "$f" > /dev/null 2>&1; then
              cp "$f" "music_checked/"
            else
              echo "Archivo descartado por error: $f"
            fi
          done

          # C. Generar lista aleatoria
          ls music_checked/*.mp3 | shuf > playlist.txt
          rm -f list.txt
          while read -r s; do
            echo "file '$s'" >> list.txt
          done < playlist.txt

          echo "AUDITORÍA: Radio lista con $(wc -l < list.txt) canciones."

          # D. TRANSMISIÓN (Utilizando el servidor oficial de YouTube)
          ffmpeg -re -stream_loop -1 -i fondo.mp4 -stream_loop -1 -f concat -safe 0 -i list.txt \
          -map 0:v:0 -map 1:a:0 \
          -c:v libx264 -preset ultrafast -tune stillimage \
          -b:v 2500k -minrate 2500k -maxrate 2500k -bufsize 5000k \
          -pix_fmt yuv420p -g 60 \
          -c:a aac -b:a 128k -ar 44100 \
          -f flv "rtmp://a.rtmp.youtube.com/live2/$YOUT
          UBE_KEY"
