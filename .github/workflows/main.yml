name: Proceso de sistema Sync
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

concurrency:
  group: radio-stream
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

jobs:
  stream:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Cleanup Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 2. Initialization
        uses: actions/checkout@v4

      - name: 3. Environment Setup (Modo Veloz)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends liquidsoap p7zip-full

      - name: 4. Data Extraction
        run: |
          mkdir -p musica_segura
          for f in *.zip; do 
            echo "Processing: $f"
            7z x "$f" -p"${{ secrets.CLAVE_ZIP }}" -o"musica_segura/" -y || true
          done

      - name: 5. Execution con Auto-Corte
        run: |
          cd musica_segura
          rm -f list.txt
          ls *.mp3 > list.txt
          
          cat << 'EOF' > radio.liq
          musica = playlist(mode="randomize", "list.txt")
          
          output.icecast(
            %mp3(bitrate=96),
            host="${{ secrets.RADIO_HOST }}",
            port=${{ secrets.RADIO_PORT }},
            password="${{ secrets.CLAVE_RADIO }}",
            mount="${{ secrets.RADIO_MOUNT }}",
            name="Media Test Stream",
            description="Automated environment for data synchronization",
            genre="Testing",
            mksafe(musica)
          )
          EOF
          
          # Corte a los 55 minutos para relevo limpio
          timeout 55m liquidsoap radio.liq 
          || true
